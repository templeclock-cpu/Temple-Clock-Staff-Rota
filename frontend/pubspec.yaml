name: careshift
description: CareShift — Smart Staff Management for Domiciliary Care
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  font_awesome_flutter: ^10.12.0
  cupertino_icons: ^1.0.6
  http: ^1.2.1

  # State
  provider: ^6.1.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3

  # ── Phase 3 — Clock-In Photo Capture ─────────────────────────────────────
  image_picker: ^1.1.2

  # ── Phase 3 — Geofencing / Location ────────────────────────────────────
  geolocator: ^12.0.0
  geolocator_web: ^4.1.1

  # ── Phase 7 — QR display & Reports ─────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── QR Camera Scanning ─────────────────────────────────────────────────
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # No local font files — Outfit loaded via google_fonts package
  assets:
    - assets/images/
    - assets/icons/
