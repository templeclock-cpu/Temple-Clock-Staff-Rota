name: Build Temple Clock Apps

on:
  push:
    branches: [main, 3rd-Branch]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Build Android APK
  # ──────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons from logo
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: TempleClockAndroid-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Build Windows Installer
  # ──────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons from logo
        run: dart run flutter_launcher_icons

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Windows Installer
        run: iscc windows\installer.iss

      - name: Upload Windows Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: TempleClock_Windows_Installer
          path: frontend/build/windows/installer/TempleClock_Setup.exe

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Build iOS App
  # ──────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons from logo
        run: dart run flutter_launcher_icons

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios && pod install --repo-update
          cd ..

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create iOS IPA-style package
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r ../../TempleClockIOS.zip Payload/
          cd ../..

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: TempleClockIOS-App
          path: frontend/TempleClockIOS.zip

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: Build macOS App (DMG installer)
  # ──────────────────────────────────────────────────────────────────
  build-macos:
    name: 🖥️ Build macOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons from logo
        run: dart run flutter_launcher_icons

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd macos && pod install --repo-update
          cd ..

      - name: Build macOS
        run: flutter build macos --release

      - name: Create macOS DMG Installer
        run: |
          APP_PATH="build/macos/Build/Products/Release/careshift.app"
          DMG_NAME="TempleClockMacOS"
          mkdir -p dmg_staging
          cp -r "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Temple Clock" -srcfolder dmg_staging -ov -format UDZO "${DMG_NAME}.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TempleClockMacOS-DMG
          path: frontend/TempleClockMacOS.dmg

  # ──────────────────────────────────────────────────────────────────
  # JOB 5: Build Web App
  # ──────────────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons from logo
        run: dart run flutter_launcher_icons

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: TempleClockWeb
          path: frontend/build/web/

      - name: Deploy to Netlify
        run: npx -y netlify-cli deploy --prod --dir=build/web --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
